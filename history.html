<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/ress.css">
    <link rel="stylesheet" href="css/history.css">
    <script defer src="js/history.js"></script>
    <title>わりペイ</title>
</head>
<body>
    <header>
        <h1>履歴詳細</h1>
    </header>
    <main>
        <div class="title">
            <h2 class="title"></h2>
            <time datetime="2026-03-02">2026/03/02</time>
        </div>
        <div class="info">
            <p class="place"><img src="img/icon_pin.png" alt=""></p>
            <p class="pay"><img src="img/icon_price.png" alt=""></p>
        </div>
        <div class="member">
            <h3>参加メンバー</h3>
            <div class="payEarlyWrap">
                <div class="payCard">
                    <img src="img/icon_tanaka.png" alt="">
                    <p class="currentPrice">田中<span>（払った人）</span></p>
                </div>
                <div class="payEarlyUsage">
                    <h3>支払い方法</h3>
                    <div class="money">
                        <p>① 現金</p>
                        <p>② PayPay</p>
                    </div>
                </div>
            </div>
            <div class="payLateWrap">
                <div class="payLate">
                    <div class="payLateUsage">
                        <img src="img/check.png" alt="">
                        <p>① 現金</p>
                    </div>
                    <div class="payCard">
                        <div class="payCardLeft">
                            <img src="" alt="">
                            <p class="payPerson"></p>
                        </div>
                        <p class="payPrice"></p>
                    </div>
                </div>
                <div class="payLate">
                    <div class="payLateUsage">
                        <img src="img/no_check.png" alt="">
                        <p>② PayPay</p>
                    </div>
                    <div class="payCard">
                        <div class="payCardLeft">
                            <img src="" alt="">
                            <p class="payPerson"></p>
                        </div>
                        <p class="payPrice"></p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <nav>
            <ul>
                <li><a href="account.html"><img src="img/nav_account.png" alt="account">アカウント</a></li>
                <li><a href="plus.html"><img src="img/nav_plus.png" alt="plus">追加</a></li>
                <li><a href="friend.html"><img src="img/nav_friend.png" alt="friend">友達</a></li>
            </ul>
        </nav>
    </footer>
</body>
</html>
